name: Build macOS App

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Regenerate app icon assets
        run: swift -module-cache-path '.build/SwiftModuleCache' 'Tools/GenerateAppIcon.swift'

      - name: Build DeskCast (Release)
        run: |
          xcodebuild \
            -project 'DeskCast.xcodeproj' \
            -scheme 'DeskCast' \
            -configuration Release \
            -derivedDataPath '.build' \
            build \
            CODE_SIGNING_ALLOWED=NO

      - name: Package app bundle
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            '.build/Build/Products/Release/DeskCast.app' \
            'DeskCast-macOS.zip'

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: DeskCast-macOS
          path: DeskCast-macOS.zip
          if-no-files-found: error

