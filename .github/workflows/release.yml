name: Publish Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Regenerate app icon assets
        run: swift -module-cache-path '.build/SwiftModuleCache' 'Tools/GenerateAppIcon.swift'

      - name: Build DeskCast (Release)
        run: |
          xcodebuild \
            -project 'DeskCast.xcodeproj' \
            -scheme 'DeskCast' \
            -configuration Release \
            -derivedDataPath '.build' \
            build \
            CODE_SIGNING_ALLOWED=NO

      - name: Package app bundle
        run: |
          ZIP_NAME="DeskCast-${GITHUB_REF_NAME:-manual}-macOS.zip"
          ditto -c -k --sequesterRsrc --keepParent \
            '.build/Build/Products/Release/DeskCast.app' \
            "${ZIP_NAME}"
          echo "ZIP_NAME=${ZIP_NAME}" >> "$GITHUB_ENV"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: DeskCast-release-build
          path: ${{ env.ZIP_NAME }}
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_NAME }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false
